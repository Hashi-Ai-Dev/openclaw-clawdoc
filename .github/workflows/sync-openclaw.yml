name: Sync OpenClaw Release

on:
  workflow_dispatch:
    inputs:
      openclaw_version:
        description: 'OpenClaw version to sync (e.g., 2026.4.22). If omitted, auto-detect latest.'
        required: false
        type: string
      dry_run:
        description: 'Run in dry-run mode (no commits, no push)'
        required: false
        type: boolean
        default: false

  # Optional: run weekly to catch updates automatically
  schedule:
    - cron: '0 14 * * 5'  # Every Friday at 2pm UTC

env:
  CLATDIR: clawdoc-live
  SKILLS_DIR: skills
  REF_DIR: references
  RELEASE_TAG: v1.0.0

jobs:
  detect:
    name: Detect OpenClaw Version
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.version.outputs.current_version }}
      synced_version: ${{ steps.version.outputs.synced_version }}
      has_update: ${{ steps.version.outputs.has_update }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current OpenClaw version
        id: version
        run: |
          # Option 1: use the explicitly provided version
          if [[ "${{ github.event.inputs.openclaw_version }}" != "" ]]; then
            CURRENT="${{ github.event.inputs.openclaw_version }}"
          else
            # Option 2: fetch latest from GitHub
            CURRENT=$(curl -s https://api.github.com/repos/openclaw/openclaw/releases/latest | python3 -c "import json,sys; print(json.load(sys.stdin)['tag_name'].lstrip('v'))" 2>/dev/null || echo "")
            if [[ -z "$CURRENT" ]]; then
              # Fallback: check local openclaw install
              CURRENT=$(openclaw --version 2>/dev/null | grep -oP 'v?\K[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "")
            fi
          fi
          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT

          # Read last synced version from .openclaw-version file
          SYNCED=""
          if [[ -f .openclaw-version ]]; then
            SYNCED=$(cat .openclaw-version | tr -d ' ')
          fi
          echo "synced_version=$SYNCED" >> $GITHUB_OUTPUT

          # Compare
          if [[ "$CURRENT" != "" && "$SYNCED" != "$CURRENT" ]]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
          fi

          echo "Current OpenClaw: $CURRENT | Synced in ClawDoc: $SYNCED"

  compare:
    name: Compare Doc Changes
    needs: detect
    if: needs.detect.outputs.has_update == 'true'
    runs-on: ubuntu-latest
    outputs:
      changed_files: ${{ steps.changes.outputs.changed_files }}
      changelog: ${{ steps.changes.outputs.changelog }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch OpenClaw docs diff
        id: changes
        run: |
          CURRENT="${{ needs.detect.outputs.current_version }}"
          SYNCED="${{ needs.detect.outputs.synced_version }}"

          echo "Comparing OpenClaw $SYNCED → $CURRENT"

          # Create temp dir for docs comparison
          TEMP=$(mktemp -d)
          PREV_DOCS="$TEMP/prev"
          NEW_DOCS="$TEMP/new"

          mkdir -p $PREV_DOCS $NEW_DOCS

          # Clone OpenClaw at previous synced version
          git clone --depth 1 --branch "v$SYNCED" https://github.com/openclaw/openclaw.git $PREV_DOCS 2>/dev/null || \
            git clone --depth 1 --branch "$SYNCED" https://github.com/openclaw/openclaw.git $PREV_DOCS

          # Clone at new version
          git clone --depth 1 --branch "v$CURRENT" https://github.com/openclaw/openclaw.git $NEW_DOCS 2>/dev/null || \
            git clone --depth 1 --branch "$CURRENT" https://github.com/openclaw/openclaw.git $NEW_DOCS || \
            git clone --depth 1 https://github.com/openclaw/openclaw.git $NEW_DOCS

          # List what changed in docs/
          CHANGED=""
          if [[ -d "$PREV_DOCS/docs" && -d "$NEW_DOCS/docs" ]]; then
            CHANGED=$(diff -rq $PREV_DOCS/docs $NEW_DOCS/docs 2>/dev/null | grep "differ" | awk '{print $2}' | sed "s|$PREV_DOCS/docs/||" || echo "")
          fi
          echo "changed_files=$CHANGED" >> $GITHUB_OUTPUT

          # Generate changelog
          CHANGELOG="### Changed files:\n$CHANGED\n\n"
          for area in tools channels concepts providers cli automation plugins; do
            if [[ -d "$PREV_DOCS/docs/$area" && -d "$NEW_DOCS/docs/$area" ]]; then
              if diff -rq $PREV_DOCS/docs/$area $NEW_DOCS/docs/$area 2>/dev/null | grep -q "differ"; then
                CHANGELOG+="### $area/ — CHANGED\n"
                CHANGELOG+="$(diff -rq $PREV_DOCS/docs/$area $NEW_DOCS/docs/$area 2>/dev/null | grep "differ" | awk '{print $2}' | sed "s|$PREV_DOCS/docs/||")\n\n"
              fi
            fi
          done
          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT

          echo "Changed files: $CHANGED"

  review:
    name: Review and Update ClawDoc
    needs: [detect, compare]
    if: needs.detect.outputs.has_update == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run doc review
        id: review
        run: |
          cd ${{ env.CLATDIR }}

          CURRENT="${{ needs.detect.outputs.current_version }}"
          SYNCED="${{ needs.detect.outputs.synced_version }}"

          echo "=== ClawDoc OpenClaw Sync Review ==="
          echo "Syncing: $SYNCED → $CURRENT"
          echo ""
          echo "Changed files:"
          echo "${{ needs.compare.outputs.changed_files }}"
          echo ""
          echo "Changelog:"
          echo "${{ needs.compare.outputs.changelog }}"

          # Map changed doc paths → relevant skill
          declare -A AREA_MAP=(
            ["tools/"]="openclaw-tools"
            ["channels/"]="openclaw-channels"
            ["concepts/"]="openclaw-concepts"
            ["providers/"]="openclaw-providers"
            ["cli/"]="openclaw-cli"
            ["automation/"]="openclaw-tools"
            ["plugins/"]="openclaw-plugins"
            ["gateway/"]="openclaw-config"
          )

          echo ""
          echo "=== Skills to update ==="
          for changed in ${{ needs.compare.outputs.changed_files }}; do
            for prefix in "${!AREA_MAP[@]}"; do
              if [[ "$changed" == "$prefix"* ]]; then
                echo "  ✓ ${AREA_MAP[$prefix]}: $changed"
                break
              fi
            done
          done

          if ${{ github.event.inputs.dry_run }}; then
            echo ""
            echo "DRY-RUN: no commits will be made"
          else
            echo ""
            echo "PRODUCTION: commits will be pushed to master"
          fi

  commit:
    name: Commit and Tag Release
    needs: [detect, compare, review]
    if: needs.detect.outputs.has_update == 'true' && github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "ClawDoc Bot"
          git config user.email "clawdoc@openclaw.ai"
          git config commit.gpgsign false

      - name: Update version file and commit
        run: |
          CURRENT="${{ needs.detect.outputs.current_version }}"

          # Update version tracking
          echo "$CURRENT" > .openclaw-version
          git add .openclaw-version

          # Stage all changed reference docs
          git add .

          if git diff --cached --quiet; then
            echo "No substantive changes to commit"
            exit 0
          fi

          git commit -m "Sync OpenClaw $CURRENT

Synced from ${{ needs.detect.outputs.synced_version }} → $CURRENT

Files changed:
${{ needs.compare.outputs.changed_files }}"

      - name: Push to master
        run: |
          git push origin master

      - name: Bump tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LAST_NUM=$(echo $LAST_TAG | grep -oP '\d+\.\d+\.\d+' || echo "0.0.0")
          MAJOR=$(echo $LAST_NUM | cut -d. -f1)
          MINOR=$(echo $LAST_NUM | cut -d. -f2)
          PATCH=$(echo $LAST_NUM | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"

          git tag -a $NEW_TAG -m "OpenClaw $CURRENT synced"
          git push origin $NEW_TAG

          echo "RELEASE_TAG=$NEW_TAG" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ClawDoc ${{ env.RELEASE_TAG }}
          body: |
            ## OpenClaw ${{ needs.detect.outputs.current_version }} Sync

            Synced from ${{ needs.detect.outputs.synced_version }} → ${{ needs.detect.outputs.current_version }}

            ### What changed in OpenClaw
            ${{ needs.compare.outputs.changed_files }}

            ### How to update your ClawDoc
            ```bash
            cd /path/to/your/clawdoc
            git pull origin master
            git fetch --tags
            ```
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  no-update:
    name: No Update Available
    if: needs.detect.outputs.has_update == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Report status
        run: |
          echo "OpenClaw is already up to date in ClawDoc"
          echo "Current: ${{ needs.detect.outputs.current_version }}"
          echo "Synced:  ${{ needs.detect.outputs.synced_version }}"